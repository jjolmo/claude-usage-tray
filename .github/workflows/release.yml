name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: claude-usage-tray-macos
            pyinstaller_args: --windowed --onefile
          - os: ubuntu-latest
            artifact: claude-usage-tray-linux
            pyinstaller_args: --onefile
          - os: windows-latest
            artifact: claude-usage-tray-windows
            pyinstaller_args: --windowed --onefile

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gir1.2-appindicator3-0.1 \
            libgirepository1.0-dev \
            python3-tk

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} \
            --name ${{ matrix.artifact }} \
            --add-data "assets:assets" \
            --hidden-import pystray._darwin \
            --hidden-import pystray._linux \
            --hidden-import pystray._win32 \
            claude_tray.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
