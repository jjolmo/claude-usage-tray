name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: claude-usage-tray-macos
            pyinstaller_args: --windowed --onefile
          - os: ubuntu-latest
            artifact: claude-usage-tray-linux
            pyinstaller_args: --onefile
          - os: windows-latest
            artifact: claude-usage-tray-windows
            pyinstaller_args: --windowed --onefile

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0

      - name: Install Python dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install platformdirs rumps pyinstaller

      - name: Install Python dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install platformdirs PyQt6 Pillow pyinstaller

      - name: Install Python dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install platformdirs pystray Pillow pyinstaller

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --windowed --onefile
          --name ${{ matrix.artifact }}
          --add-data "assets:assets"
          claude_tray.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile
          --name ${{ matrix.artifact }}
          --add-data "assets:assets"
          --hidden-import PyQt6.QtWidgets
          --hidden-import PyQt6.QtGui
          --hidden-import PyQt6.QtCore
          claude_tray.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --windowed --onefile
          --name ${{ matrix.artifact }}
          --add-data "assets;assets"
          --hidden-import pystray._win32
          claude_tray.py

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ${{ matrix.artifact }}.zip ${{ matrix.artifact }}.app

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip

      - name: Upload artifact (Linux/Windows)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
