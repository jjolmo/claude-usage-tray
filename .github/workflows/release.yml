name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS .app bundle
        run: |
          APP="claude-usage-tray-macos.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources/assets"

          # Copy source files
          cp claude_tray.py config.py usage_api.py settings_dialog.py "$APP/Contents/Resources/"
          cp assets/icon.png "$APP/Contents/Resources/assets/"

          # Create launcher script
          cat > "$APP/Contents/MacOS/run" << 'LAUNCHER'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")/../Resources" && pwd)"
          VENV="$HOME/.claude-usage-tray-venv"
          if [ ! -d "$VENV" ]; then
            python3 -m venv "$VENV"
            "$VENV/bin/pip" install --quiet platformdirs rumps certifi
          fi
          cd "$DIR"
          exec "$VENV/bin/python" claude_tray.py
          LAUNCHER
          # Fix indentation from heredoc
          sed -i '' 's/^          //' "$APP/Contents/MacOS/run"
          chmod +x "$APP/Contents/MacOS/run"

          # Create Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>run</string>
            <key>CFBundleIdentifier</key>
            <string>com.claude-usage-tray</string>
            <key>CFBundleName</key>
            <string>Claude Usage Tray</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>LSUIElement</key>
            <true/>
          </dict>
          </plist>
          PLIST
          sed -i '' 's/^          //' "$APP/Contents/Info.plist"

          zip -r claude-usage-tray-macos.zip "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-tray-macos
          path: claude-usage-tray-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0

      - name: Install Python dependencies
        run: pip install platformdirs PyQt6 Pillow pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --onefile
          --name claude-usage-tray-linux
          --add-data "assets:assets"
          --hidden-import PyQt6.QtWidgets
          --hidden-import PyQt6.QtGui
          --hidden-import PyQt6.QtCore
          claude_tray.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-tray-linux
          path: dist/claude-usage-tray-linux*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install platformdirs pystray Pillow pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --windowed --onefile
          --name claude-usage-tray-windows
          --add-data "assets;assets"
          --hidden-import pystray._win32
          claude_tray.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-tray-windows
          path: dist/claude-usage-tray-windows*

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
